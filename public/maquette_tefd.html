<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEFD · Recommandations Toulouse — maquette</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,7000&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --violette:#3a2a4d;      /* violet de Toulouse — dominante premium */
    --violette-clair:#5b486f;
    --brique:#bc6a5a;        /* brique rose — accent secondaire */
    --brique-fonce:#9c5446;
    --rose-pale:#f3ebe6;     /* fond, brique très diluée (pas le crème générique) */
    --craie:#fdfbf9;         /* surface des cartes */
    --encre:#241c28;         /* texte */
    --encre-doux:#6b6270;
    --laiton:#a9853f;        /* sceau de fraîcheur, étoiles — dorure du Capitole */
    --trait:#e4d8d0;
    --ombre:0 1px 2px rgba(36,28,40,.06), 0 8px 24px rgba(36,28,40,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    background:var(--rose-pale);
    color:var(--encre);
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .app{display:flex;flex-direction:column;height:100vh;}

  /* ---------- Header ---------- */
  header{
    background:var(--violette);
    color:#f3ece4;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;
    border-bottom:3px solid var(--laiton);
    flex-shrink:0;
  }
  .brand{display:flex;align-items:baseline;gap:12px;}
  .brand .mark{
    font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:.01em;
  }
  .brand .mark em{color:var(--brique);font-style:normal;}
  .brand .hotel{font-size:12.5px;color:#c9bfd1;letter-spacing:.04em;text-transform:uppercase;}
  .lang{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:999px;padding:3px;}
  .lang button{
    border:0;background:transparent;color:#cdc3d6;cursor:pointer;
    font:600 12px/1 'Hanken Grotesk';padding:6px 11px;border-radius:999px;letter-spacing:.05em;
  }
  .lang button.on{background:var(--brique);color:#fff;}

  /* ---------- Layout ---------- */
  .body{display:grid;grid-template-columns:1fr 40%;flex:1;min-height:0;}
  .work{overflow-y:auto;padding:24px 26px 40px;}
  .mapwrap{position:relative;border-left:1px solid var(--trait);}
  #map{position:absolute;inset:0;}

  .eyebrow{
    font:700 11px/1 'Hanken Grotesk';letter-spacing:.16em;text-transform:uppercase;
    color:var(--brique-fonce);margin:0 0 12px;
  }

  /* ---------- Persona deck (élément signature) ---------- */
  .deck{display:flex;flex-wrap:wrap;gap:8px;}
  .persona{
    border:1px solid var(--trait);background:var(--craie);
    border-radius:12px;padding:9px 13px;cursor:pointer;text-align:left;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
    min-width:0;
  }
  .persona:hover{border-color:var(--violette-clair);transform:translateY(-1px);}
  .persona .pcode{font:700 10px/1 'Hanken Grotesk';color:var(--encre-doux);letter-spacing:.1em;}
  .persona .pname{font:600 14px/1.2 'Hanken Grotesk';margin-top:3px;}
  .persona.on{background:var(--violette);border-color:var(--violette);}
  .persona.on .pname{color:#fff;}
  .persona.on .pcode{color:var(--brique);}
  .persona:focus-visible{outline:3px solid var(--laiton);outline-offset:2px;}

  .ressort{
    margin:16px 0 22px;padding:13px 16px;border-left:3px solid var(--brique);
    background:rgba(188,106,90,.07);border-radius:0 8px 8px 0;
  }
  .ressort .lbl{font:700 10px/1 'Hanken Grotesk';letter-spacing:.14em;text-transform:uppercase;color:var(--brique-fonce);}
  .ressort .txt{font-family:'Fraunces',serif;font-size:17px;font-style:italic;margin-top:4px;color:var(--violette);}

  /* ---------- Time control ---------- */
  .ctrl{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  .ctrl label{font:600 13px 'Hanken Grotesk';color:var(--encre-doux);white-space:nowrap;}
  .ctrl input[type=range]{flex:1;accent-color:var(--violette);}
  .ctrl .val{font:700 13px 'Hanken Grotesk';color:var(--violette);background:#fff;border:1px solid var(--trait);border-radius:999px;padding:4px 11px;white-space:nowrap;}

  /* ---------- Cards ---------- */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
  .card{
    background:var(--craie);border:1px solid var(--trait);border-radius:14px;
    padding:16px 16px 14px;cursor:pointer;box-shadow:var(--ombre);
    display:flex;flex-direction:column;gap:9px;
    animation:rise .35s ease both;
  }
  .card:hover{border-color:var(--brique);}
  .card:focus-visible{outline:3px solid var(--laiton);outline-offset:2px;}
  .card .cat{font:700 10px/1 'Hanken Grotesk';letter-spacing:.12em;text-transform:uppercase;color:var(--brique-fonce);}
  .card .nom{font-family:'Fraunces',serif;font-size:19px;font-weight:600;line-height:1.15;}
  .card .edito{font-size:13.5px;color:var(--encre-doux);}
  .card .meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:auto;padding-top:4px;}
  .pill{font:600 11px/1 'Hanken Grotesk';padding:5px 9px;border-radius:999px;border:1px solid var(--violette);color:var(--violette);}
  .pill.car{border-color:var(--encre-doux);color:var(--encre-doux);}
  .seal{font:600 11px/1 'Hanken Grotesk';padding:5px 9px;border-radius:999px;background:rgba(169,133,63,.12);color:var(--laiton);border:1px solid rgba(169,133,63,.35);}
  .empty{color:var(--encre-doux);font-size:14px;padding:30px 4px;}

  .toggle-row{display:flex;align-items:center;gap:11px;margin:-4px 0 20px;}
  .tg-lbl{font:600 13px 'Hanken Grotesk';color:var(--encre-doux);}
  .switch{width:44px;height:25px;border-radius:999px;border:0;background:var(--trait);position:relative;cursor:pointer;padding:0;transition:background .18s;flex-shrink:0;}
  .switch .knob{position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:left .18s;}
  .switch.on{background:var(--violette);}
  .switch.on .knob{left:22px;}
  .switch:focus-visible{outline:3px solid var(--laiton);outline-offset:2px;}
  .tg-hint{font:600 11px 'Hanken Grotesk';color:var(--brique-fonce);letter-spacing:.03em;}
  .card.hors{opacity:.6;}
  .tag-hors{font:600 10px 'Hanken Grotesk';letter-spacing:.07em;text-transform:uppercase;color:var(--encre-doux);border:1px solid var(--trait);border-radius:999px;padding:4px 8px;}

  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* ---------- Fiche overlay ---------- */
  .scrim{position:fixed;inset:0;background:rgba(36,28,40,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:900;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .fiche{
    position:fixed;top:0;right:0;height:100%;width:min(440px,92vw);
    background:var(--rose-pale);z-index:901;box-shadow:-12px 0 40px rgba(36,28,40,.18);
    transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;
  }
  .fiche.show{transform:none;}
  .fiche .photo{
    height:190px;background:linear-gradient(135deg,var(--violette),var(--brique));
    position:relative;display:flex;align-items:flex-end;padding:18px;flex-shrink:0;
  }
  .fiche .photo .ph-note{
    font:600 11px 'Hanken Grotesk';letter-spacing:.05em;color:#fff;
    background:rgba(36,28,40,.4);padding:6px 11px;border-radius:999px;backdrop-filter:blur(3px);
  }
  .fiche .close{
    position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:999px;border:0;
    background:rgba(253,251,249,.92);color:var(--encre);font-size:18px;cursor:pointer;line-height:1;
  }
  .fiche .fbody{padding:20px 22px;overflow-y:auto;flex:1;}
  .fiche .fcat{font:700 10px 'Hanken Grotesk';letter-spacing:.14em;text-transform:uppercase;color:var(--brique-fonce);}
  .fiche h2{font-family:'Fraunces',serif;font-weight:600;font-size:26px;margin:5px 0 2px;}
  .fiche .addr{font-size:13px;color:var(--encre-doux);}
  .rating{display:flex;align-items:center;gap:8px;margin:14px 0;font:600 14px 'Hanken Grotesk';}
  .rating .stars{color:var(--laiton);letter-spacing:1px;}
  .rating .src{color:var(--encre-doux);font-weight:500;font-size:12.5px;}
  .review{background:var(--craie);border:1px solid var(--trait);border-radius:10px;padding:13px 15px;font-size:13.5px;color:var(--encre);font-style:italic;}
  .review .who{display:block;font-style:normal;font-size:11.5px;color:var(--encre-doux);margin-top:7px;}
  .fnote{font-size:14px;margin:16px 0;}
  .fnote .lbl{font:700 10px 'Hanken Grotesk';letter-spacing:.14em;text-transform:uppercase;color:var(--brique-fonce);display:block;margin-bottom:5px;}
  .acces{font-size:13px;color:var(--encre-doux);margin:14px 0;}
  .actions{padding:16px 22px;border-top:1px solid var(--trait);display:flex;gap:10px;flex-shrink:0;background:var(--rose-pale);}
  .btn{flex:1;text-align:center;text-decoration:none;font:600 14px 'Hanken Grotesk';padding:13px;border-radius:11px;cursor:pointer;border:0;}
  .btn-ghost{background:transparent;border:1.5px solid var(--brique);color:var(--brique-fonce);}
  .btn-ghost:hover{background:rgba(188,106,90,.08);}
  .btn-go{background:var(--violette);color:#fff;}
  .btn-go:hover{background:var(--violette-clair);}
  .qr{font-size:11.5px;color:var(--encre-doux);text-align:center;padding:0 22px 16px;background:var(--rose-pale);}

  .leaflet-container{font-family:'Hanken Grotesk',sans-serif;}
  .pin-hotel,.pin-lieu{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);}
  .pin-hotel{background:var(--laiton);width:18px;height:18px;}
  .pin-lieu{background:var(--brique);width:14px;height:14px;}

  /* ---------- Responsive ---------- */
  @media (max-width:860px){
    .body{grid-template-columns:1fr;grid-template-rows:auto 220px;}
    .mapwrap{order:2;border-left:0;border-top:1px solid var(--trait);}
    .work{order:1;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>

        <span class="tg-hint" id="maskHint">filtre actif</span>
      </div>

      <div class="cards" id="cards"></div>
    </main>

    <div class="mapwrap"><div id="map"></div></div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="fiche" id="fiche" aria-hidden="true"></aside>

   seal:{fr:"vérifié août 2025",en:"verified Aug 2025",es:"verif. ago 2025"}, rating:"4,6",
   note:{fr:"Fusées, capsules, planétarium. Le temps fort du passionné d'aviation comme de la famille en visite étudiante.",en:"Rockets, capsules, planetarium. The highlight for aviation lovers and visiting student families alike.",es:"Cohetes, cápsulas, planetario. El imprescindible del aficionado a la aviación y de la familia en visita."},
   review:{fr:"Une demi-journée passionnante, prévoir le créneau le matin.",en:"A fascinating half-day, book a morning slot.",es:"Media jornada apasionante, reservar por la mañana."},
   acces:{fr:"15 min en voiture · ou bus L8 depuis le centre",en:"15 min by car · or bus L8 from centre",es:"15 min en coche · o bus L8 desde el centro"}},
];

/* ---------- État + i18n UI ---------- */
const I18N = {
  hotel:{fr:"Hôtel des Beaux-Arts · réception",en:"Hôtel des Beaux-Arts · front desk",es:"Hôtel des Beaux-Arts · recepción"},
  forWhom:{fr:"Pour quel client ?",en:"For which guest?",es:"¿Para qué cliente?"},
  ressort:{fr:"Ressort émotionnel",en:"Emotional driver",es:"Resorte emocional"},
  onfoot:{fr:"À pied, maximum",en:"On foot, up to",es:"A pie, máximo"},
  min:{fr:"min",en:"min",es:"min"},
  go:{fr:"Y aller",en:"Take me there",es:"Cómo llegar"},
  photos:{fr:"Voir sur OpenStreetMap",en:"View on OpenStreetMap",es:"Ver en OpenStreetMap"},
  ph:{fr:"Fiche OpenStreetMap",en:"OpenStreetMap page",es:"Ficha OpenStreetMap"},
  qr:{fr:"Astuce comptoir : proposez le QR pour que le client reparte avec l'itinéraire sur son téléphone.",en:"Desk tip: offer the QR so the guest leaves with the route on their phone.",es:"Consejo de recepción: ofrezca el QR para que el cliente se lleve la ruta en su móvil."},
  editoLbl:{fr:"Le conseil de la maison",en:"The house recommendation",es:"La recomendación de la casa"},
  empty:{fr:"Aucune adresse à pied dans ce rayon pour ce profil. Élargissez le temps de marche.",en:"No walkable address in range for this profile. Widen the walking time.",es:"Ninguna dirección a pie en este radio para este perfil. Amplíe el tiempo."},
  maskLbl:{fr:"Masquer le hors-persona",en:"Hide off-persona",es:"Ocultar fuera de perfil"},
  maskHintOn:{fr:"filtre actif",en:"filter on",es:"filtro activo"},
  maskHintOff:{fr:"tout visible · profil en tête",en:"all shown · profile first",es:"todo visible · perfil primero"},
  horsProfil:{fr:"hors profil",en:"off-profile",es:"fuera de perfil"},
  src:{fr:"source OSM",en:"OSM source",es:"fuente OSM"},
};

const state = {lang:"fr", persona:"04", maxWalk:15, mask:true};
const t = (k)=> I18N[k][state.lang];
const L = (obj)=> obj[state.lang] || obj.fr;

/* ---------- Carte ---------- */
const map = L_init();
let markers = [];
function L_init(){
  const m = L.map('map',{zoomControl:true,attributionControl:true}).setView([HOTEL.lat,HOTEL.lng],14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19, attribution:'© OpenStreetMap'
  }).addTo(m);
  L.marker([HOTEL.lat,HOTEL.lng],{icon:divIcon('pin-hotel')}).addTo(m).bindTooltip("Hôtel");
  return m;
}
function divIcon(cls){return L.divIcon({className:'',html:`<div class="${cls}"></div>`,iconSize:[18,18]});}

/* ---------- Rendu ---------- */
function visibleLieux(){
  const walkOk = x => x.walk===null ? true : x.walk<=state.maxWalk;
  let list = state.mask
    ? LIEUX.filter(x=>x.p.includes(state.persona)).filter(walkOk)  // masquage : persona seul
    : LIEUX.filter(walkOk);                                        // sans masquage : tout visible
  // tri doux : persona en tête, puis proximité — jamais éliminatoire
  return list.slice().sort((a,b)=>{
    const pa = a.p.includes(state.persona)?0:1;
    const pb = b.p.includes(state.persona)?0:1;
    return (pa-pb) || ((a.walk??99)-(b.walk??99));
  });
}

function renderDeck(){
  const d=document.getElementById('deck'); d.innerHTML='';
  PERSONAS.forEach(p=>{
    const b=document.createElement('button');
    b.className='persona'+(p.code===state.persona?' on':'');
    b.innerHTML=`<div class="pcode">${p.code}</div><div class="pname">${p[state.lang]}</div>`;
    b.onclick=()=>{state.persona=p.code;renderAll();};
    d.appendChild(b);
  });
  const pr=PERSONAS.find(p=>p.code===state.persona);
  document.getElementById('ressort').textContent='« '+L(pr.ressort)+' »';
}

function renderCards(){
  const c=document.getElementById('cards'); c.innerHTML='';
  const list=visibleLieux();
  if(!list.length){c.innerHTML=`<p class="empty">${t('empty')}</p>`;}
  list.forEach(x=>{
    const hors = !state.mask && !x.p.includes(state.persona);
    const card=document.createElement('button');
    card.className='card'+(hors?' hors':'');
    const walkPill = x.walk===null
      ? `<span class="pill car">🚗 ${state.lang==='fr'?'en voiture':state.lang==='en'?'by car':'en coche'}</span>`
      : `<span class="pill">🚶 ${x.walk} ${t('min')}</span>`;
    const horsTag = hors ? `<span class="tag-hors">${t('horsProfil')}</span>` : '';
    card.innerHTML=`
      <div class="cat">${L(x.cat)}</div>
      <div class="nom">${x.nom}</div>
      <div class="edito">${L(x.note)}</div>
      <div class="meta">${walkPill}<span class="seal">✦ ${L(x.seal)}</span>${horsTag}</div>`;
    card.onclick=()=>openFiche(x);
    c.appendChild(card);
  });
  renderMarkers(list);
}

function renderMarkers(list){
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  const pts=[[HOTEL.lat,HOTEL.lng]];
  list.forEach(x=>{
    const mk=L.marker([x.lat,x.lng],{icon:divIcon('pin-lieu')}).addTo(map).bindTooltip(x.nom);
    mk.on('click',()=>openFiche(x));
    markers.push(mk); pts.push([x.lat,x.lng]);
  });
  if(pts.length>1) map.fitBounds(pts,{padding:[40,40],maxZoom:15});
}

function osmUrl(x){
  // Lien vers la fiche OSM du lieu — gratuit, open source, sans clé
  if(x.osm_type && x.osm_id) return `https://www.openstreetmap.org/${x.osm_type}/${x.osm_id}`;
  // Fallback : recherche Nominatim par nom + ville
  return 'https://www.openstreetmap.org/search?query='+encodeURIComponent(x.nom+' Toulouse');
}
function navUrl(x){
  // geo: URI universel — ouvre l'appli de navigation par défaut (OsmAnd, Organic Maps, Plans…)
  // Fallback web : OpenStreetMap directions
  if(x.lat && x.lng) return `geo:${x.lat},${x.lng}?q=${encodeURIComponent(x.nom)}`;
  return 'https://www.openstreetmap.org/directions?to='+encodeURIComponent(x.nom+' Toulouse');
}

function openFiche(x){
  const f=document.getElementById('fiche');
  f.innerHTML=`
    <div class="photo">
      <button class="close" aria-label="Fermer">×</button>
      <span class="ph-note">▣ ${t('ph')}</span>
    </div>
    <div class="fbody">
      <div class="fcat">${L(x.cat)}</div>
      <h2>${x.nom}</h2>
      <div class="addr">${L(x.acces)}</div>
      <div class="rating"><span class="stars">★★★★★</span> <strong>${x.rating}</strong> <span class="src">· ${t('src')}</span></div>
      <div class="review">« ${L(x.review)} »<span class="who">— ${t('src')}</span></div>
      <div class="fnote"><span class="lbl">${t('editoLbl')}</span>${L(x.note)}</div>
    </div>
    <div class="actions">
      <a class="btn btn-ghost" href="${osmUrl(x)}" target="_blank" rel="noopener">${t('photos')}</a>
      <a class="btn btn-go" href="${navUrl(x)}" target="_blank" rel="noopener">${t('go')} →</a>
    </div>
    <div class="qr">${t('qr')}</div>`;
  f.querySelector('.close').onclick=closeFiche;
  f.classList.add('show'); f.setAttribute('aria-hidden','false');
  document.getElementById('scrim').classList.add('show');
}
function closeFiche(){
  document.getElementById('fiche').classList.remove('show');
  document.getElementById('fiche').setAttribute('aria-hidden','true');
  document.getElementById('scrim').classList.remove('show');
}

function renderStatics(){
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i'); if(I18N[k]) el.textContent=t(k);
  });
  document.getElementById('walkVal').textContent=state.maxWalk+' '+t('min');
  document.getElementById('maskHint').textContent = state.mask ? t('maskHintOn') : t('maskHintOff');
}

function renderAll(){renderDeck();renderCards();renderStatics();}

/* ---------- Événements ---------- */
document.querySelectorAll('.lang button').forEach(b=>{
  b.onclick=()=>{
    state.lang=b.dataset.lang;
    document.querySelectorAll('.lang button').forEach(x=>x.classList.toggle('on',x===b));
    document.documentElement.lang=state.lang;
    renderAll();
  };
});
const walk=document.getElementById('walk');
walk.oninput=()=>{state.maxWalk=+walk.value;document.getElementById('walkVal').textContent=state.maxWalk+' '+t('min');renderCards();};
const maskBtn=document.getElementById('maskBtn');
maskBtn.onclick=()=>{
  state.mask=!state.mask;
  maskBtn.classList.toggle('on',state.mask);
  maskBtn.setAttribute('aria-checked',state.mask);
  renderAll();
};
document.getElementById('scrim').onclick=closeFiche;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeFiche();});

renderAll();
setTimeout(()=>map.invalidateSize(),200);
</script>
</body>
</html>
