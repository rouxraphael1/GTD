name: build-data

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [baserow-update]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Générer app_data.json depuis Baserow
        env:
          BASEROW_EMAIL:    ${{ secrets.BASEROW_EMAIL }}
          BASEROW_PASSWORD: ${{ secrets.BASEROW_PASSWORD }}
          OUT_PATH: docs/app_data.json
        run: node scripts/export.mjs

      - name: Précalculer les temps de marche (ORS Matrix)
        env:
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
          OUT_PATH: docs/app_data.json
        run: node scripts/precompute-walk.mjs
        continue-on-error: true

      - name: Committer si le contenu a changé
        run: |
          git config user.name  "tefd-bot"
          git config user.email "bot@tefd.local"
          git add docs/app_data.json app_data.json
          if git diff --staged --quiet; then
            echo "Aucun changement de données."
          else
            git commit -m "data: rebuild app_data.json ($(date -u +%F))"
            git push
          fi
