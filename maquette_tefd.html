<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEFD · Recommandations Toulouse — maquette</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Les polices Google sont cosmétiques uniquement : si elles ne se chargent
     pas (réseau coupé), tout retombe sur system-ui sans casser l'interaction. */
  :root{
    --violette:#3a2a4d;      /* violet de Toulouse — dominante premium */
    --violette-clair:#5b486f;
    --brique:#bc6a5a;        /* brique rose — accent secondaire */
    --brique-fonce:#9c5446;
    --rose-pale:#f3ebe6;
    --craie:#fdfbf9;
    --encre:#241c28;
    --encre-doux:#6b6270;
    --laiton:#a9853f;        /* sceau de fraîcheur, étoiles, dorure */
    --trait:#e4d8d0;
    --ombre:0 1px 2px rgba(36,28,40,.06), 0 8px 24px rgba(36,28,40,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    background:var(--rose-pale);
    color:var(--encre);
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .app{display:flex;flex-direction:column;height:100vh;}

  /* ---------- Bandeau d'état (diagnostic, masqué si tout va bien) ---------- */
  #bootError{display:none;background:#7a2b2b;color:#fff;padding:10px 18px;font:600 13px 'Hanken Grotesk';}
  #bootError.show{display:block;}

  /* ---------- Header ---------- */
  header{
    background:var(--violette);color:#f3ece4;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;border-bottom:3px solid var(--laiton);flex-shrink:0;flex-wrap:wrap;gap:10px;
  }
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .brand .mark{font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:.01em;}
  .brand .mark em{color:var(--brique);font-style:normal;}
  .brand .hotel{font-size:12.5px;color:#c9bfd1;letter-spacing:.04em;text-transform:uppercase;}
  .header-right{display:flex;align-items:center;gap:10px;}
  .reset{
    border:1px solid rgba(255,255,255,.25);background:transparent;color:#e7e0eb;
    font:600 12px 'Hanken Grotesk';padding:7px 12px;border-radius:999px;cursor:pointer;letter-spacing:.02em;
  }
  .reset:hover{background:rgba(255,255,255,.1);}
  .lang{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:999px;padding:3px;}
  .lang button{border:0;background:transparent;color:#cdc3d6;cursor:pointer;font:600 12px/1 'Hanken Grotesk';padding:6px 11px;border-radius:999px;letter-spacing:.05em;}
  .lang button.on{background:var(--brique);color:#fff;}

  /* ---------- Layout ---------- */
  .body{display:grid;grid-template-columns:1fr 38%;flex:1;min-height:0;}
  .work{overflow-y:auto;padding:24px 26px 40px;}
  .mapwrap{position:relative;border-left:1px solid var(--trait);background:#eee2da;}

  .eyebrow{font:700 11px/1 'Hanken Grotesk';letter-spacing:.16em;text-transform:uppercase;color:var(--brique-fonce);margin:22px 0 12px;}
  .eyebrow:first-child{margin-top:0;}

  /* ---------- Persona deck (élément signature) ---------- */
  .deck{display:flex;flex-wrap:wrap;gap:8px;}
  .persona{
    border:1px solid var(--trait);background:var(--craie);
    border-radius:12px;padding:9px 13px;cursor:pointer;text-align:left;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;min-width:0;
  }
  .persona:hover{border-color:var(--violette-clair);transform:translateY(-1px);}
  .persona .pcode{font:700 10px/1 'Hanken Grotesk';color:var(--encre-doux);letter-spacing:.1em;}
  .persona .pname{font:600 14px/1.2 'Hanken Grotesk';margin-top:3px;}
  .persona.on{background:var(--violette);border-color:var(--violette);}
  .persona.on .pname{color:#fff;}
  .persona.on .pcode{color:var(--brique);}
  .persona:focus-visible{outline:3px solid var(--laiton);outline-offset:2px;}

  .ressort{margin:16px 0 4px;padding:13px 16px;border-left:3px solid var(--brique);background:rgba(188,106,90,.07);border-radius:0 8px 8px 0;}
  .ressort .lbl{font:700 10px/1 'Hanken Grotesk';letter-spacing:.14em;text-transform:uppercase;color:var(--brique-fonce);}
  .ressort .txt{font-family:'Fraunces',serif;font-size:17px;font-style:italic;margin-top:4px;color:var(--violette);}

  /* ---------- Segmented control (moment du jour) ---------- */
  .seg{display:flex;gap:2px;background:var(--craie);border:1px solid var(--trait);border-radius:999px;padding:3px;width:fit-content;}
  .seg button{border:0;background:transparent;color:var(--encre-doux);cursor:pointer;font:600 12px/1 'Hanken Grotesk';padding:7px 13px;border-radius:999px;letter-spacing:.02em;}
  .seg button.on{background:var(--violette);color:#fff;}
  .seg button:focus-visible{outline:3px solid var(--laiton);outline-offset:2px;}

  /* ---------- Time control ---------- */
  .ctrl{display:flex;align-items:center;gap:14px;margin:18px 0;}
  .ctrl label{font:600 13px 'Hanken Grotesk';color:var(--encre-doux);white-space:nowrap;}
  .ctrl input[type=range]{flex:1;accent-color:var(--violette);}
  .ctrl .val{font:700 13px 'Hanken Grotesk';color:var(--violette);background:#fff;border:1px solid var(--trait);border-radius:999px;padding:4px 11px;white-space:nowrap;}

  /* ---------- Toggles (réutilisables) ---------- */
  .toggle-row{display:flex;align-items:center;gap:11px;margin:10px 0;flex-wrap:wrap;}
  .tg-lbl{font:600 13px 'Hanken Grotesk';color:var(--encre-doux);}
  .switch{width:44px;height:25px;border-radius:999px;border:0;background:var(--trait);position:relative;cursor:pointer;padding:0;transition:background .18s;flex-shrink:0;}
  .switch .knob{position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:left .18s;}
  .switch.on{background:var(--violette);}
  .switch.on .knob{left:22px;}
  .switch:focus-visible{outline:3px solid var(--laiton);outline-offset:2px;}
  .tg-hint{font:600 11px 'Hanken Grotesk';color:var(--brique-fonce);letter-spacing:.03em;}

  /* ---------- Cards ---------- */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-top:8px;}
  .card{
    background:var(--craie);border:1px solid var(--trait);border-radius:14px;
    padding:16px 16px 14px;cursor:pointer;box-shadow:var(--ombre);
    display:flex;flex-direction:column;gap:9px;animation:rise .35s ease both;
    width:100%;text-align:left;font:inherit;color:inherit;
  }
  .card:hover{border-color:var(--brique);}
  .card:focus-visible{outline:3px solid var(--laiton);outline-offset:2px;}
  .card .cat{font:700 10px/1 'Hanken Grotesk';letter-spacing:.12em;text-transform:uppercase;color:var(--brique-fonce);}
  .card .nom{font-family:'Fraunces',serif;font-size:19px;font-weight:600;line-height:1.15;}
  .card .edito{font-size:13.5px;color:var(--encre-doux);}
  .card .meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:auto;padding-top:4px;}
  .pill{font:600 11px/1 'Hanken Grotesk';padding:5px 9px;border-radius:999px;border:1px solid var(--violette);color:var(--violette);}
  .pill.car{border-color:var(--encre-doux);color:var(--encre-doux);}
  .seal{font:600 11px/1 'Hanken Grotesk';padding:5px 9px;border-radius:999px;background:rgba(169,133,63,.12);color:var(--laiton);border:1px solid rgba(169,133,63,.35);}
  .empty{color:var(--encre-doux);font-size:14px;padding:30px 4px;}
  .card.hors{opacity:.6;}
  .tag-hors{font:600 10px 'Hanken Grotesk';letter-spacing:.07em;text-transform:uppercase;color:var(--encre-doux);border:1px solid var(--trait);border-radius:999px;padding:4px 8px;}

  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* ---------- Mini-carte SVG (zéro dépendance réseau) ---------- */
  #mapsvg{position:absolute;inset:0;width:100%;height:100%;}
  .pin{cursor:pointer;}
  .pin circle{transition:r .12s ease;}
  .pin:hover circle{r:9;}
  .pin.hors{opacity:.55;}
  .map-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--encre-doux);font-size:13px;padding:20px;text-align:center;}

  /* ---------- Fiche overlay ---------- */
  .scrim{position:fixed;inset:0;background:rgba(36,28,40,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:900;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .fiche{
    position:fixed;top:0;right:0;height:100%;width:min(440px,92vw);
    background:var(--rose-pale);z-index:901;box-shadow:-12px 0 40px rgba(36,28,40,.18);
    transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;
  }
  .fiche.show{transform:none;}
  .fiche .photo{height:170px;background:linear-gradient(135deg,var(--violette),var(--brique));position:relative;display:flex;align-items:flex-end;padding:18px;flex-shrink:0;}
  .fiche .photo .ph-note{font:600 11px 'Hanken Grotesk';letter-spacing:.05em;color:#fff;background:rgba(36,28,40,.4);padding:6px 11px;border-radius:999px;backdrop-filter:blur(3px);}
  .fiche .close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:999px;border:0;background:rgba(253,251,249,.92);color:var(--encre);font-size:18px;cursor:pointer;line-height:1;}
  .fiche .fbody{padding:18px 22px;overflow-y:auto;flex:1;}
  .fiche .fcat{font:700 10px 'Hanken Grotesk';letter-spacing:.14em;text-transform:uppercase;color:var(--brique-fonce);}
  .fiche h2{font-family:'Fraunces',serif;font-weight:600;font-size:25px;margin:5px 0 2px;}
  .fiche .addr{font-size:13px;color:var(--encre-doux);}
  .rating{display:flex;align-items:center;gap:8px;margin:12px 0;font:600 14px 'Hanken Grotesk';}
  .rating .stars{color:var(--laiton);letter-spacing:1px;}
  .rating .src{color:var(--encre-doux);font-weight:500;font-size:12.5px;}
  .review{background:var(--craie);border:1px solid var(--trait);border-radius:10px;padding:13px 15px;font-size:13.5px;color:var(--encre);font-style:italic;}
  .review .who{display:block;font-style:normal;font-size:11.5px;color:var(--encre-doux);margin-top:7px;}
  .fnote{font-size:14px;margin:14px 0;}
  .fnote .lbl{font:700 10px 'Hanken Grotesk';letter-spacing:.14em;text-transform:uppercase;color:var(--brique-fonce);display:block;margin-bottom:5px;}
  .acces{font-size:13px;color:var(--encre-doux);margin:14px 0;}

  /* Panneau de transparence du score */
  .scorebox{margin:16px 0 4px;padding:13px 14px;background:var(--craie);border:1px solid var(--trait);border-radius:10px;}
  .scorebox .lbl{font:700 10px 'Hanken Grotesk';letter-spacing:.14em;text-transform:uppercase;color:var(--brique-fonce);display:block;margin-bottom:9px;}
  .srow{display:grid;grid-template-columns:84px 1fr 30px;align-items:center;gap:8px;margin:5px 0;font-size:11.5px;color:var(--encre-doux);}
  .sbar{height:7px;border-radius:999px;background:var(--trait);overflow:hidden;}
  .sbar i{display:block;height:100%;border-radius:999px;}
  .stotal{margin-top:9px;padding-top:9px;border-top:1px solid var(--trait);font:700 12px 'Hanken Grotesk';color:var(--violette);display:flex;justify-content:space-between;}

  .actions{padding:14px 22px;border-top:1px solid var(--trait);display:flex;gap:10px;flex-shrink:0;background:var(--rose-pale);}
  .btn{flex:1;text-align:center;text-decoration:none;font:600 14px 'Hanken Grotesk';padding:13px;border-radius:11px;cursor:pointer;border:0;}
  .btn-ghost{background:transparent;border:1.5px solid var(--brique);color:var(--brique-fonce);}
  .btn-ghost:hover{background:rgba(188,106,90,.08);}
  .btn-go{background:var(--violette);color:#fff;}
  .btn-go:hover{background:var(--violette-clair);}
  .qr{font-size:11.5px;color:var(--encre-doux);text-align:center;padding:0 22px 14px;background:var(--rose-pale);}

  /* ---------- Responsive ---------- */
  @media (max-width:860px){
    .body{grid-template-columns:1fr;grid-template-rows:auto 220px;}
    .mapwrap{order:2;border-left:0;border-top:1px solid var(--trait);}
    .work{order:1;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div id="bootError"></div>
<div class="app">
  <header>
    <div class="brand">
      <span class="mark">Toulouse <em>Experience</em> Front Desk</span>
      <span class="hotel" data-i="hotel">Hôtel des Beaux-Arts · réception</span>

    <div class="header-right">
      <button class="reset" id="resetBtn" type="button" data-i="reset">↺ Réinitialiser</button>
      <div class="lang" role="group" aria-label="Langue">
        <button data-lang="fr" class="on" type="button">FR</button>
        <button data-lang="en" type="button">EN</button>
        <button data-lang="es" type="button">ES</button>
      </div>
    </div>
  </header>

  <div class="body">
    <main class="work">
      <p class="eyebrow" data-i="forWhom">Pour quel client ?</p>
      <div class="deck" id="deck" role="group" aria-label="Persona"></div>

      <div class="ressort">
        <div class="lbl" data-i="ressort">Ressort émotionnel</div>
        <div class="txt" id="ressort"></div>
      </div>

      <p class="eyebrow" data-i="momentLbl">Moment du jour</p>
      <div class="seg" id="momentSeg" role="group" aria-label="Moment du jour"></div>

      <div class="ctrl">
        <label data-i="onfoot">À pied, maximum</label>
        <input type="range" id="walk" min="5" max="20" step="1" value="15" aria-label="Temps de marche maximum">
        <span class="val" id="walkVal">15 min</span>
      </div>

      <div class="toggle-row">
        <span class="tg-lbl" data-i="rayonLbl">Limiter à ce rayon</span>
        <button id="rayonBtn" class="switch" role="switch" aria-checked="false" aria-label="Limiter à ce rayon"><span class="knob"></span></button>
        <span class="tg-hint" id="rayonHint"></span>
      </div>

      <div class="toggle-row">
        <span class="tg-lbl" data-i="maskLbl">Masquer le hors-persona</span>
        <button id="maskBtn" class="switch on" role="switch" aria-checked="true" aria-label="Masquer le hors-persona"><span class="knob"></span></button>
        <span class="tg-hint" id="maskHint"></span>
      </div>

      <div class="cards" id="cards"></div>
    </main>

    <div class="mapwrap"><svg id="mapsvg" viewBox="0 0 520 520" preserveAspectRatio="xMidYMid meet"></svg></div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="fiche" id="fiche" aria-hidden="true"></aside>

/* ============================================================
   MOTEUR DE RECO — les 4 signaux de la spec, pondérés. Tri doux,
   jamais éliminatoire : les filtres optionnels (mask, rayon) sont
   les SEULS à retirer une adresse, et seulement s'ils sont activés.
   ============================================================ */
const POIDS = {persona:0.40, prioEdito:0.25, moment:0.20, proximite:0.15};
const PROX_MAX = 30;
const clamp = (v,lo,hi)=>Math.max(lo,Math.min(hi,v));

function momentCourant(date){
  const h = date.getHours();
  if(h>=6 && h<11) return "matin";
  if(h>=11 && h<15) return "midi";
  if(h>=18 && h<23) return "soir";
  return "journee";
}
function affinitePersona(x, persona){
  if(!persona) return 0.5;
  if(x.p.includes(persona.code)) return 1.0;
  if(persona.categories_prioritaires.includes(x.categorie)) return 0.5;
  return 0.0;
}
function scoreProximite(x){
  if(typeof x.walk !== "number") return 0;
  return clamp(1 - x.walk/PROX_MAX, 0, 1);
}
function adequationMoment(x, momentSel){
  const tags = x.moment || [];
  if(tags.includes(momentSel)) return 1.0;
  if(!tags.length || tags.includes("journee")) return 0.5;
  return 0.2;
}
function scorePriorite(x){
  const p = typeof x.priorite_edito === "number" ? x.priorite_edito : 3;
  return clamp((p-1)/4, 0, 1);
}
function scoreOf(x, persona, momentSel){
  const detail = {
    persona: affinitePersona(x, persona),
    prio: scorePriorite(x),
    moment: adequationMoment(x, momentSel),
    prox: scoreProximite(x),
  };
  const total = POIDS.persona*detail.persona + POIDS.prioEdito*detail.prio
              + POIDS.moment*detail.moment + POIDS.proximite*detail.prox;
  return {total, detail};
}

/* ---------- État ---------- */
const state = {
  lang:"fr", persona:"04", maxWalk:15, mask:true,
  rayonActif:false, moment: momentCourant(new Date()),
};
const DEFAULTS = JSON.parse(JSON.stringify(state));
const t = (k)=> (I18N[k] && I18N[k][state.lang]) || k;
const L = (obj)=> (obj && (obj[state.lang] || obj.fr)) || "";
const currentPersona = ()=> PERSONAS.find(p=>p.code===state.persona) || null;

/* ---------- Rendu : liste triée (4 signaux) + filtres optionnels ---------- */
function visibleLieux(){
  const persona = currentPersona();
  let list = LIEUX.filter(x=>{
    if(state.mask && !x.p.includes(state.persona)) return false;          // filtre "ce persona seulement"
    if(state.rayonActif){                                                  // filtre "rayon strict"
      if(typeof x.walk !== "number" || x.walk > state.maxWalk) return false;
    }
    return true;
  });
  return list
    .map(x=>({...x, _s: scoreOf(x, persona, state.moment)}))
    .sort((a,b)=> b._s.total - a._s.total);
}

function renderDeck(){
  const d=document.getElementById('deck'); d.innerHTML='';
  PERSONAS.forEach(p=>{
    const b=document.createElement('button');
    b.type='button';
    b.className='persona'+(p.code===state.persona?' on':'');
    b.innerHTML=`<div class="pcode">${p.code}</div><div class="pname">${p[state.lang]}</div>`;
    b.onclick=()=>{state.persona=p.code;renderAll();};
    d.appendChild(b);
  });
  const pr=currentPersona();
  document.getElementById('ressort').textContent = pr ? '« '+L(pr.ressort)+' »' : '';
}

function renderMomentSeg(){
  const seg=document.getElementById('momentSeg'); seg.innerHTML='';
  ["matin","midi","soir","journee"].forEach(m=>{
    const b=document.createElement('button');
    b.type='button';
    b.className = m===state.moment ? 'on' : '';
    b.textContent = t(m);
    b.setAttribute('aria-pressed', m===state.moment);
    b.onclick=()=>{state.moment=m;renderAll();};
    seg.appendChild(b);
  });
}

function renderCards(){
  const c=document.getElementById('cards'); c.innerHTML='';
  const list=visibleLieux();
  if(!list.length){c.innerHTML=`<p class="empty">${t('empty')}</p>`;}
  list.forEach(x=>{
    const hors = !state.mask && !x.p.includes(state.persona);
    const card=document.createElement('button');
    card.type='button';
    card.className='card'+(hors?' hors':'');
    const walkPill = typeof x.walk === "number"
      ? `<span class="pill">🚶 ${x.walk} ${t('min')}</span>`
      : `<span class="pill car">🚗 ${state.lang==='fr'?'en voiture':state.lang==='en'?'by car':'en coche'}</span>`;
    const horsTag = hors ? `<span class="tag-hors">${t('horsProfil')}</span>` : '';
    card.innerHTML=`
      <div class="cat">${L(x.cat)}</div>
      <div class="nom">${x.nom}</div>
      <div class="edito">${L(x.note)}</div>
      <div class="meta">${walkPill}<span class="seal">✦ ${L(x.seal)}</span>${horsTag}</div>`;
    card.onclick=()=>openFiche(x);
    c.appendChild(card);
  });
  renderMap(list);
}

/* ---------- Mini-carte SVG (autonome, sans CDN ni réseau) ---------- */
function project(lat,lng,b,w,h,pad){
  const dx = (b.maxLng-b.minLng) || 0.001;
  const dy = (b.maxLat-b.minLat) || 0.001;
  return [ pad + (lng-b.minLng)/dx*(w-2*pad), pad + (b.maxLat-lat)/dy*(h-2*pad) ];
}
function renderMap(list){
  const svg = document.getElementById('mapsvg');
  svg.innerHTML='';
  const pts = [HOTEL, ...list];
  const lats = pts.map(p=>p.lat), lngs = pts.map(p=>p.lng);
  const b = {minLat:Math.min(...lats),maxLat:Math.max(...lats),minLng:Math.min(...lngs),maxLng:Math.max(...lngs)};
  const W=520,H=520,pad=46;

  // Garonne stylisée — repère géographique authentique, purement décoratif.
  const NS='http://www.w3.org/2000/svg';
  const river=document.createElementNS(NS,'path');
  river.setAttribute('d',`M ${W*0.38} 0 C ${W*0.5} ${H*0.3}, ${W*0.3} ${H*0.55}, ${W*0.46} ${H}`);
  river.setAttribute('fill','none'); river.setAttribute('stroke','#cdbfd6');
  river.setAttribute('stroke-width','14'); river.setAttribute('opacity','0.35');
  svg.appendChild(river);

  function addPin(p, isHotel, hors){
    const [x,y] = project(p.lat,p.lng,b,W,H,pad);
    const g = document.createElementNS(NS,'g');
    g.setAttribute('class','pin'+(hors?' hors':''));
    g.setAttribute('tabindex','0');
    g.setAttribute('role','button');
    g.setAttribute('aria-label', p.nom);
    const c = document.createElementNS(NS,'circle');
    c.setAttribute('cx',x); c.setAttribute('cy',y);
    c.setAttribute('r', isHotel?9:7);
    c.setAttribute('fill', isHotel?'var(--laiton)':'var(--brique)');
    c.setAttribute('stroke','#fff'); c.setAttribute('stroke-width','2');
    const title=document.createElementNS(NS,'title'); title.textContent=p.nom;
    g.appendChild(c); g.appendChild(title);
    if(!isHotel){
      g.onclick=()=>openFiche(p);
      g.onkeydown=(e)=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();openFiche(p);} };
    }
    svg.appendChild(g);
  }
  addPin(HOTEL, true, false);
  list.forEach(x=> addPin(x, false, !state.mask && !x.p.includes(state.persona)));

  const wrap=document.querySelector('.mapwrap');
  const existingEmpty=wrap.querySelector('.map-empty');
  if(!list.length){
    if(!existingEmpty){
      const div=document.createElement('div'); div.className='map-empty'; div.textContent=t('empty');
      wrap.appendChild(div);
    }
  } else if(existingEmpty){
    existingEmpty.remove();
  }
}

function mapsUrl(x){
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(x.nom+' Toulouse');
}
function navUrl(x){
  return 'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(x.nom+' Toulouse')+'&travelmode=walking';
}

function scoreBar(label, value, colorVar){
  const pct = Math.round(value*100);
  return `<div class="srow"><span>${label}</span><span class="sbar"><i style="width:${pct}%;background:${colorVar}"></i></span><span>${pct}%</span></div>`;
}

function openFiche(x){
  const persona = currentPersona();
  const {total, detail} = scoreOf(x, persona, state.moment);
  const f=document.getElementById('fiche');
  f.innerHTML=`
    <div class="photo">
      <button class="close" type="button" aria-label="Fermer">×</button>
      <span class="ph-note">▣ ${t('ph')}</span>
    </div>
    <div class="fbody">
      <div class="fcat">${L(x.cat)}</div>
      <h2>${x.nom}</h2>
      <div class="addr">${L(x.acces)}</div>
      <div class="rating"><span class="stars">★★★★★</span> <strong>${x.rating}</strong> <span class="src">· ${t('src')}</span></div>
      <div class="review">« ${L(x.review)} »<span class="who">— ${t('src')}</span></div>
      <div class="fnote"><span class="lbl">${t('editoLbl')}</span>${L(x.note)}</div>
      <div class="scorebox">
        <span class="lbl">${t('scoreLbl')}</span>
        ${scoreBar(t('sigPersona'), detail.persona, 'var(--violette)')}
        ${scoreBar(t('sigPrio'), detail.prio, 'var(--laiton)')}
        ${scoreBar(t('sigMoment'), detail.moment, 'var(--brique)')}
        ${scoreBar(t('sigProx'), detail.prox, 'var(--violette-clair)')}
        <div class="stotal"><span>${t('total')}</span><span>${Math.round(total*100)}%</span></div>
      </div>
    </div>
    <div class="actions">
      <a class="btn btn-ghost" href="${mapsUrl(x)}" target="_blank" rel="noopener">${t('photos')}</a>
      <a class="btn btn-go" href="${navUrl(x)}" target="_blank" rel="noopener">${t('go')} →</a>
    </div>
    <div class="qr">${t('qr')}</div>`;
  f.querySelector('.close').onclick=closeFiche;
  f.classList.add('show'); f.setAttribute('aria-hidden','false');
  document.getElementById('scrim').classList.add('show');
}
function closeFiche(){
  document.getElementById('fiche').classList.remove('show');
  document.getElementById('fiche').setAttribute('aria-hidden','true');
  document.getElementById('scrim').classList.remove('show');
}

function renderStatics(){
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i'); if(I18N[k]) el.textContent=t(k);
  });
  document.getElementById('walkVal').textContent=state.maxWalk+' '+t('min');
  document.getElementById('maskHint').textContent = state.mask ? t('maskHintOn') : t('maskHintOff');
  document.getElementById('rayonHint').textContent = state.rayonActif ? t('rayonHintOn') : t('rayonHintOff');
}

function renderAll(){ renderDeck(); renderMomentSeg(); renderCards(); renderStatics(); }

/* ---------- Liaison des événements (toujours exécutée, indépendamment de la carte) ---------- */
function bindEvents(){
  document.querySelectorAll('.lang button').forEach(b=>{
    b.onclick=()=>{
      state.lang=b.dataset.lang;
      document.querySelectorAll('.lang button').forEach(x=>x.classList.toggle('on',x===b));
      document.documentElement.lang=state.lang;
      renderAll();
    };
  });

  const walk=document.getElementById('walk');
  walk.oninput=()=>{
    state.maxWalk=+walk.value;
    document.getElementById('walkVal').textContent=state.maxWalk+' '+t('min');
    renderCards();
  };

  const maskBtn=document.getElementById('maskBtn');
  maskBtn.onclick=()=>{
    state.mask=!state.mask;
    maskBtn.classList.toggle('on',state.mask);
    maskBtn.setAttribute('aria-checked',state.mask);
    renderAll();
  };

  const rayonBtn=document.getElementById('rayonBtn');
  rayonBtn.onclick=()=>{
    state.rayonActif=!state.rayonActif;
    rayonBtn.classList.toggle('on',state.rayonActif);
    rayonBtn.setAttribute('aria-checked',state.rayonActif);
    renderAll();
  };

  document.getElementById('resetBtn').onclick=()=>{
    Object.assign(state, JSON.parse(JSON.stringify(DEFAULTS)));
    document.querySelectorAll('.lang button').forEach(x=>x.classList.toggle('on', x.dataset.lang===state.lang));
    document.getElementById('walk').value = state.maxWalk;
    maskBtn.classList.toggle('on', state.mask); maskBtn.setAttribute('aria-checked', state.mask);
    rayonBtn.classList.toggle('on', state.rayonActif); rayonBtn.setAttribute('aria-checked', state.rayonActif);
    document.documentElement.lang = state.lang;
    renderAll();
  };

  document.getElementById('scrim').onclick=closeFiche;
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeFiche(); });
}

/* ---------- Démarrage ---------- */
bindEvents();   // les contrôles répondent même si le rendu plante plus bas
renderAll();

} catch (err) {
  console.error('TEFD démo — erreur fatale :', err);
  const bar = document.getElementById('bootError');
  bar.textContent = 'Erreur de chargement de la démo — détail dans la console du navigateur (F12) : ' + (err && err.message ? err.message : err);
  bar.classList.add('show');
}
</script>
